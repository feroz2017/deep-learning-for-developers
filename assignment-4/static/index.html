<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What's in this image?</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      color: #333;
      margin: 0 0 20px;
    }
    .zone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .zone:hover,
    .zone.over {
      border-color: #4a9;
      background: #f0faf4;
    }
    .zone span {
      color: #666;
      font-size: 0.95rem;
    }
    .thumb {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .thumb.show {
      display: block;
      margin: 12px auto 0;
    }
    button {
      background: #2a9d5c;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      margin-top: 8px;
    }
    button:hover {
      background: #228b4e;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      display: none;
    }
    .result.show {
      display: block;
    }
    .result h3 {
      font-size: 0.8rem;
      color: #888;
      font-weight: 600;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .answer {
      font-size: 1.1rem;
      color: #222;
      font-weight: 500;
      margin: 0;
    }
    .tags {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .tag {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .err {
      color: #c00;
      font-size: 0.9rem;
      margin-top: 12px;
    }
    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>What's in this image?</h1>

    <form id="uploadForm" enctype="multipart/form-data" method="post" action="#">
      <div class="zone" id="zone">
        <input type="file" id="fileInput" name="file" accept="image/jpeg,image/png,image/webp,image/gif">
        <span id="prompt">Drop an image here or click to choose</span>
        <img class="thumb" id="thumb" alt="">
      </div>
      <button type="button" id="btn" disabled>Tell me</button>
    </form>

    <div class="result" id="result">
      <h3>Detected</h3>
      <p class="answer" id="answer"></p>
      <div class="tags" id="tags"></div>
    </div>
    <p class="err" id="err"></p>
  </div>

  <script>
    (function () {
      // API base: when page is from file:// or from another port (e.g. Live Server 5500), call API on port 8000
      var onPort8000 = window.location.port === '8000';
      var API_BASE = (window.location.protocol === 'file:' || !onPort8000)
        ? (window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : (window.location.origin.replace(/:\d+$/, '') + ':8000'))
        : '';

      var form = document.getElementById('uploadForm');
      var fileInput = document.getElementById('fileInput');
      var zone = document.getElementById('zone');
      var thumb = document.getElementById('thumb');
      var prompt = document.getElementById('prompt');
      var btn = document.getElementById('btn');
      var result = document.getElementById('result');
      var answer = document.getElementById('answer');
      var tagsEl = document.getElementById('tags');
      var err = document.getElementById('err');

      // When user drops a file we can't set input.files, so keep a reference
      var droppedFile = null;

      function setFile(f) {
        if (!f) {
          droppedFile = null;
          btn.disabled = true;
          prompt.textContent = 'Drop an image here or click to choose';
          thumb.classList.remove('show');
          return;
        }
        if (!f.type.match(/^image\/(jpeg|png|webp|gif)$/)) {
          err.textContent = 'Please choose a JPEG, PNG, or WebP image.';
          return;
        }
        err.textContent = '';
        droppedFile = f;
        prompt.textContent = f.name;
        thumb.src = URL.createObjectURL(f);
        thumb.classList.add('show');
        btn.disabled = false;
        result.classList.remove('show');
      }

      function onFileChange() {
        droppedFile = null;
        setFile(fileInput.files[0] || null);
      }

      zone.onclick = function () { fileInput.click(); };
      zone.ondragover = function (e) { e.preventDefault(); zone.classList.add('over'); };
      zone.ondragleave = function () { zone.classList.remove('over'); };
      zone.ondrop = function (e) {
        e.preventDefault();
        zone.classList.remove('over');
        if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
      };
      fileInput.addEventListener('change', onFileChange);

      form.onsubmit = function (e) { e.preventDefault(); };

      btn.onclick = function () {
        var fileToSend = droppedFile || (fileInput.files[0]);
        if (!fileToSend) return;
        err.textContent = '';
        btn.disabled = true;
        btn.textContent = '…';

        var fd = new FormData();
        fd.append('file', fileToSend);
        var url = API_BASE + '/predict-multilabel?threshold=0.5';

        fetch(url, {
          method: 'POST',
          body: fd
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) {
              err.textContent = data.error;
            } else {
              var labels = data.predicted_labels || [];
              if (labels.length === 0) {
                answer.textContent = 'Nothing detected above threshold.';
                tagsEl.innerHTML = '';
              } else {
                answer.textContent = 'This image contains: ' + labels.join(', ') + '.';
                tagsEl.innerHTML = labels.map(function (l) {
                  return '<span class="tag">' + l + '</span>';
                }).join('');
              }
              result.classList.add('show');
            }
          })
          .catch(function (e) {
            err.textContent = 'Error: ' + (e.message || 'Request failed');
          })
          .then(function () {
            btn.disabled = false;
            btn.textContent = 'Tell me';
          });
      };
    })();
  </script>
</body>
</html>
